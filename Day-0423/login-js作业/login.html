<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title></title>
		<link rel="stylesheet" href="./css/login.css" />
		<script src="https://unpkg.com/vue@3"></script>
	</head>

	<body>
		<div class="box">
			<!-- 左侧背景 -->
			<div class="left_bg"></div>
			<!-- 右侧内容 -->
			<div class="right">
				<div class="right_header">
					<!-- logo -->
					<div class="logo">
						<img src="https://s1.ax1x.com/2023/04/14/ppzXmFI.png" alt="" />
						<span>小米账号</span>
					</div>
					<!-- 右侧选项 -->
					<div class="r_option">
						<a href="javascript:;">用户协议</a>
						<a href="javascript:;">隐私政策</a>
						<a href="javascript:;">帮助中心</a>
						<select name="" id="">
							<option value="">中文(简体)</option>
							<option value="">中文(繁体)</option>
							<option value="">English</option>
						</select>
					</div>
				</div>
				<div class="right_body">

					<div class="log_reg">
						<a herf="javascript:;" class="isActive">登录</a>
						<a herf="javascript:;">注册</a>
					</div>
					<span class="error" style="color:#ff0000;padding-left:50px"></span>
					<!-- 登录 -->
					<div class="contents login_content cShow">
						<form action="">
							<div class="uname">
								<input type="text" placeholder="邮箱/手机号码/小米ID" class="ipt" />
							</div>
							<div class="pwd">
								<input type="password" placeholder="密码" class="ipt" />
							</div>
							<div class="change">
								<input type="checkbox" onclick="l_change()" />
								<span>已阅读并同意小米账号<a href="javascript:;">用户协议</a>和
									<a href="javascript:;">隐私政策</a>
								</span>
							</div>
						</form>
						<button class="log_btn" onclick="goLogin()">登录</button>
						<div class="forget">
							<a href="javascript:;">忘记密码？</a>
							<a href="javascript:;">手机号登录</a>
						</div>
						<div class="other">其他方式登录</div>
						<div class="other_content">
							<img src="https://s1.ax1x.com/2023/04/14/p9SEuQJ.png" alt="">
							<img src="https://s1.ax1x.com/2023/04/14/p9SEGFK.png" alt="">
							<img src="https://s1.ax1x.com/2023/04/14/p9SEJJO.png" alt="">
							<img src="https://s1.ax1x.com/2023/04/14/p9SEUQH.png" alt="">
						</div>
					</div>
					<!-- 注册 -->
					<div class="contents register_content">
						<form action="">
							<!-- <div>
								<select class="selectCity">
								</select>
							</div> -->
							<div>
								<input type="text" placeholder="手机号" class="ipt" />
							</div>
							<div class="yzm">
								<input type="password" placeholder="密码" class="ipt" />
								<!-- <input type="text" placeholder="请输入验证码" class="ipt" maxlength="4" />
								<span>获取验证码</span> -->
							</div>
							<div class="change">
								<input type="checkbox" onclick="r_change()" />
								<span>已阅读并同意小米账号<a href="javascript:;">用户协议</a>和
									<a href="javascript:;">隐私政策</a>
								</span>
							</div>
						</form>
						<button class="reg_btn" onclick="goRegister()">注册</button>
						<div class="Unavailable">收不到验证码？</div>
						<div class="other">其他方式登录</div>
						<div class="other_content">
							<img src="https://s1.ax1x.com/2023/04/14/p9SEuQJ.png" alt="">
							<img src="https://s1.ax1x.com/2023/04/14/p9SEGFK.png" alt="">
							<img src="https://s1.ax1x.com/2023/04/14/p9SEJJO.png" alt="">
							<img src="https://s1.ax1x.com/2023/04/14/p9SEUQH.png" alt="">
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			// 1.tab
			const tabHeaders = document.querySelectorAll('.log_reg a');
			const tabContents = document.querySelectorAll('.contents');

			for (let i = 0; i < tabHeaders.length; i++) {
				tabHeaders[i].addEventListener('click', function() {
					// 隐藏所有内容
					for (let j = 0; j < tabContents.length; j++) {
						tabContents[j].classList.remove('cShow');
					}
					// 显示点击的内容
					tabContents[i].classList.add('cShow');
					// 取消选中状态
					for (let j = 0; j < tabHeaders.length; j++) {
						tabHeaders[j].classList.remove('isActive');
					}
					// 添加选中状态
					tabHeaders[i].classList.add('isActive');
				});
			}
			//2.表单验证
			// 条款
			// 用户条款勾选
			let isChecked = false,
				isChecked1 = false;
			let userList = [];

			function l_change() {
				isChecked = !isChecked;
			}

			function r_change() {
				isChecked1 = !isChecked1;
			}
			// 登录
			const error = document.querySelector('.error');
			const username = document.querySelectorAll('.ipt')[0];
			const password = document.querySelectorAll('.ipt')[1];

			function goLogin() {
				// console.log(username.value, password.value, isChecked)
				if (username.value == '') {
					username.style.border = '1px solid #ff6600';
					error.innerHTML = "账号为空，请输入";
				} else if (password.value == '') {
					username.style.border = '1px solid #ff6600';
					error.innerHTML = "密码为空，请输入";
				} else {
					if (!isChecked) {
						error.innerHTML = "请勾选用户条款";
					} else {
						userList.forEach(item => {
							console.log(item);
							if (item.phone == username.value && item.password == password.value) {
								alert('登录成功')
							} else {
								alert('登录失败')
							}
						})
					}
				}
			}
			// 注册
			const phone = document.querySelectorAll('.ipt')[2];
			const r_password = document.querySelectorAll('.ipt')[3];
			let city= [{
					value: 'China',
					text: '中国'
				},
				{
					value: 'mg',
					text: '美国'
				},
				{
					value: 'other',
					text: '其他'
				}
			];
			let cityvalue ='China'
			function goRegister() {
				console.log(phone.value, r_password.value, isChecked1)
				if (phone.value == '') {
					phone.style.border = '1px solid #ff6600';
					error.innerHTML = "账号不能为空";
				} else if (r_password.value == '') {
					phone.style.border = '1px solid #ff6600';
					error.innerHTML = "账号密码不能为空";
				} else {
					if (!isChecked1) {
						error.innerHTML = "请勾选用户条款";
					} else {
						const regCN = /^1\d{10}$/
						if (!regCN.test(phone.value)) {
							phone.style.border = '1px solid #ff6600';
							error.innerHTML = "请输入正确的手机号";
						} else {
							let isRegister
							userList.forEach(item => {
								if (item.phone == phone.value) {
									isRegister = true
								} else {
									isRegister = false
								}
							})
							if (isRegister) {
								phone.style.border = '1px solid #ff6600';
								error.innerHTML = "手机号被占用";
							} else {
								let data = {
									id: +new Date(),
									phone: phone.value,
									password: r_password.value,
									city: cityvalue
								}
								userList.push(data)
								alert('注册成功')
								console.log(userList)
								this.phone = ''
								this.r_password = ''
							}
						}
					}
				}
			}
		</script>

	</body>
</html>
