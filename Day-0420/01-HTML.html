<!DOCTYPE html> <!-- 声明文档类型为 HTML5 -->
<html> <!-- HTML 文档的根标签 -->
    <head> <!-- 页面头部区域，放置元信息 -->
        <title>HTML</title> <!-- 设置浏览器标签页标题 -->
        <meta charset="utf-8"> <!-- 设置字符编码为 UTF-8，支持中文显示 -->
    </head> <!-- 头部区域结束 -->
    <body> <!-- 页面主体区域，显示给用户的内容写在这里 -->
        <!-- 标题 -->
        <h1>标题1</h1> <!-- 一级标题，内容为空 -->
        <h2>标题2</h2> <!-- 二级标题，内容为空 -->
        <h3>标题3</h3> <!-- 三级标题，内容为空 -->
        <h4>标题4</h4> <!-- 四级标题，内容为空 -->
        <h5>标题5</h5> <!-- 五级标题，内容为空 -->
        <h6>标题6</h6> <!-- 六级标题，内容为空 -->
        <p align="center" title="标签描述">段落</p> <!-- 段落元素，内容为 -->
        <!-- 分隔符 -->
        <hr>
        <!-- 强制换行符 -->
        today<br>Monday
        <!-- 块元素：划分板块 -->
        <div>这是一个块元素</div> <!-- 块级元素，内容为 "这是一个块元素" -->
        <div>这是另一个块元素</div> <!-- 块级元素，内容为 "这是另一个块元素" -->
        <div>这是第三个块元素</div> <!-- 块级元素，内容为 "这是第三个块元素" -->
        
        <!-- 行内元素：不换行 -->
        <b>加粗</b> <!-- 行内元素 -->
        <b>加粗</b> <!-- 行内元素 -->
        <b>加粗</b> <!-- 行内元素 -->
        <strong>加粗</strong>
        <strong>加粗</strong>
        <strong>加粗</strong>
        <i>斜体</i> <!-- 行内元素 -->
        <i>斜体</i>
        <em>斜体</em>
        <em>斜体</em>
        <i><b>加粗倾斜</b></i> <!-- 行内元素，嵌套使用 -->
        <!-- 删除线 -->
        <del>删除线</del> <!-- 行内元素，内容为 "删除线" -->
        <!-- 下划线 -->
        <ins>下划线</ins>
        <!-- 上标下标 -->
        2<sup>3</sup> = 8
        H<sub>2</sub>O
        <!-- 行元素 -->
        <span>这是一个行内元素</span> <!-- 行内元素，内容为 "这是一个行内元素" -->
        <span>这是另一个行内元素</span> <!-- 行内元素，内容为 "这是另一个行内元素" -->
        <span>这是第三个行内元素</span> <!-- 行内元素，内容为 "这是第三个行内元素" -->
    </body> <!-- 主体区域结束 -->
</html> <!-- HTML 文档结束 -->
