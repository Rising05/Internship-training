<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:flex; /* 弹性布局 */
            flex-direction: column; /* 默认行排列 */
            /* flex-wrap: wrap;默认不换行 */

            justify-content: space-between; /* 默认flex-start 
                center:元素在主轴上居中
                flex-end:元素在主轴上末尾
                space-between:元素在主轴上平均分布，第一个元素放在起始
                space-around:元素在主轴上平均分布，每个元素两侧间距相等
                space-evenly:元素在主轴上平均分布，每个元素两侧间距相等，且与容器边缘的间距相等
            */
            align-items: center; /* 默认stretch 拉伸
                flex-start:元素在交叉轴上起始位置
                center:元素在交叉轴上居中
                flex-end:元素在交叉轴上末尾
                stretch:元素在交叉轴上拉伸，填满容器（默认值）
            */
            width: 800px;
            height: 300px;
            background-color: #ffff00;
            margin: 0 auto;
        }
        .container .item{
            width: 120px;
            
        }
        .container .item:nth-child(1){
            background-color: #ff0000;
        }
        .container .item:nth-child(2){
            background-color: #00ff00;
        }
        .container .item:nth-child(3){
            background-color: #0000ff;
        }
        .container .item:nth-child(4){
            background-color: #ff00ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">曹操</div>
        <div class="item">诸葛亮</div>
        <div class="item">关羽</div>
        <div class="item">张飞</div>
    </div>
</body>
</html>
