<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table 
    border="1" 
    width="500" 
    align="center" 
    cellpadding="10"
    cellspacing="3"
    bgcolor="#f0f0f0"
    background="pic1.webp"
    style="color:rgb(205, 13, 115)"
    >
        <tr>
            <th>姓名</th>
            <th>年龄</th>
            <th>性别</th>
        </tr>
        <tr>
            <td>张三</td>
            <td>25</td>
            <td>男</td>
        </tr>
        <tr>
            <td>李四</td>
            <td>30</td>
            <td>女</td>
        </tr>
    </table>

    <!-- td属性 -->
    <table border="1" width="500" align="center" cellpadding="10" cellspacing="3" bgcolor="blue">
        <tr>
            <th
            width="80"
            height="100"
            align="right"
            valign="bottom">数学</th>
            <th>语文</th>
            <th>英语</th>
            <th>总分</th>
        </tr>
        <tr>
            <td align="center" valign="top" colspan="2">90</td>
            <td align="center" valign="middle">85</td>
            <td align="center" valign="bottom">95</td>
        </tr>
        <tr>
            <td align="center" valign="top" rowspan="2">80</td>
            <td align="center" valign="middle">75</td>
            <td align="center" valign="bottom">85</td>
            <td align="center" valign="top">80</td>
        </tr>   
        <tr>
            <td align="center" valign="middle">80</td>
            <td align="center" valign="bottom">90</td>
            <td align="center" valign="top">85</td>
        </tr>
    </table>
</body>
</html>
