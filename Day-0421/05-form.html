<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 表单 -->
    <form action="xx.py" method="GET">
        <div>
            <label for="username">用户名：</label>
            <!-- 文本框 -->
            <input type="text" id="username" name="username" placeholder="请输入用户名称">
        </div>
        <div>
            <label for="password">密&nbsp;&nbsp;&nbsp;码：</label>
            <!-- 密码框 -->
            <input type="password" id="password" name="password" placeholder="请输入密码">
        </div>
        <!-- 单选框 -->
        <div>
            <label for="gender">性别：</label>
            <input type="radio" id="male" name="gender" value="male" checked>
            <label for="male">男</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">女</label>
        </div>
        <!-- 复选框 checkbox -->
        <div>
            <label for="hobby">爱好：</label>
            <input type="checkbox" id="hobby1" name="hobby" value="reading" checked>
            <label for="hobby1">阅读</label>
            <input type="checkbox" id="hobby2" name="hobby" value="sports">
            <label for="hobby2">运动</label>
            <input type="checkbox" id="hobby3" name="hobby" value="music">
            <label for="hobby3">音乐</label>
        </div>
        <!-- 浏览框 multiple 多选-->
        <div>
            <label for="file">上传文件：</label>
            <input type="file" id="file" name="file" multiple>
        </div>
        <!-- 下拉列表框 select multiple 多选 size列表框大小 selected 默认选中项-->
        <div>
            <label for="country">国家：</label>
            <select id="country" name="country">
                <option value="china" selected>中国</option>
                <option value="usa">美国</option>
                <option value="japan">日本</option>
            </select>
        </div>
        <!-- 多行文本框 -->
        <div>
            <label for="intr">个人简介：</label>
            <textarea id="intr" name="intr" rows="10" cols="50" placeholder="请输入个人简介"></textarea>
        </div>
        <div>
            <!-- 提交按钮 -->
            <button>登录</button>
            <input type="submit" value="注册">
            <!-- 普通按钮 不能提交 结合js -->
            <input type="button" value="点击">
            <!-- 重置按钮 -->
            <input type="reset" value="重置">
            <!-- 隐藏域 -->
            <input type="hidden" name="user_id" value="123456">
        </div>
    </form>
</body>
</html>
