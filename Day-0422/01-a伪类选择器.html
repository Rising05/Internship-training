<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{/* 链接统一样式 */
            color : black;
            text-decoration: none;
        }
        a:hover{
            color : red;
            text-decoration: underline;
        }
        .nav1 a{
            color : green;
        }
        .nav1 a:hover{
            color : blue;
            text-decoration: wavy underline;
        }
    </style>
</head>
<body>
    <div>
        <a href="#">首页</a>
        <a href="#">国内</a>
        <a href="#">国际</a>
        <a href="#">时尚</a>
    </div>

    <div class="nav1">
        <a href="#">首页</a>
        <a href="#">国内</a>
        <a href="#">国际</a>
        <a href="#">时尚</a>
    </div>
     
    
</body>
</html>
