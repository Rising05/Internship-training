<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优购商城</title>
    <style>
        :root {
            --brand: #ff666d;
            --brand-deep: #ff5a5f;
            --bg: #f3f3f3;
            --text: #333333;
            --muted: #888888;
            --line: #e7e7e7;
            --footer: #303030;
            --card-shadow: 0 8px 18px rgba(31, 36, 56, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            display: block;
            width: 100%;
        }

        .page {
            min-width: 1200px;
        }

        .wrap {
            width: 1648px;
            margin: 0 auto;
        }

        .topbar {
            background: var(--brand);
            color: #ffffff;
        }

        .topbar .wrap {
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14px;
        }

        .brand-badge {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.25);
            display: grid;
            place-items: center;
            font-size: 15px;
        }

        .search-area {
            display: flex;
            align-items: center;
            gap: 0;
            width: 420px;
        }

        .search-input {
            flex: 1;
            height: 28px;
            border: none;
            outline: none;
            padding: 0 12px;
            border-radius: 3px 0 0 3px;
            font-size: 12px;
        }

        .search-btn {
            width: 68px;
            height: 28px;
            border: none;
            background: #f45757;
            color: #ffffff;
            font-size: 12px;
            cursor: pointer;
            border-radius: 0 3px 3px 0;
        }

        .user-links {
            display: flex;
            gap: 18px;
            font-size: 12px;
        }

        .nav {
            background: #ffffff;
            border-bottom: 1px solid var(--line);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }

        .nav .wrap {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 34px;
            font-size: 12px;
        }

        .nav a:hover,
        .user-links a:hover {
            color: var(--brand-deep);
        }

        .hero {
            margin-top: 16px;
            border-radius: 10px;
            height: 173px;
            background: linear-gradient(90deg, #d97bf3 0%, #f35c82 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
        }

        .hero::before {
            width: 240px;
            height: 240px;
            left: -60px;
            top: -70px;
        }

        .hero::after {
            width: 320px;
            height: 320px;
            right: -90px;
            bottom: -160px;
        }

        .hero h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 12px;
            opacity: 0.96;
        }

        .hero-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }

        .hero-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
        }

        main {
            padding-bottom: 50px;
        }

        .section-title {
            margin: 18px 0 12px;
            font-size: 16px;
            font-weight: 700;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .category-card {
            height: 70px;
            background: #ffffff;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }

        .category-icon {
            font-size: 22px;
            line-height: 1;
        }

        .category-name {
            font-size: 12px;
            color: #444444;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }

        .product-card {
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(31, 36, 56, 0.13);
        }

        .product-image {
            height: 114px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        .product-image span {
            font-size: 66px;
            line-height: 1;
            transform: translateY(10px);
            filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.18));
        }

        .product-image::after {
            content: "";
            position: absolute;
            inset: auto 0 0 0;
            height: 34px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.38) 100%);
        }

        .product-body {
            padding: 10px 10px 8px;
        }

        .product-title {
            min-height: 34px;
            font-size: 12px;
            line-height: 1.45;
            margin-bottom: 8px;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .price {
            color: #ff5c54;
            font-size: 25px;
            font-weight: 700;
            transform: scale(0.5);
            transform-origin: left center;
            width: 72px;
            margin-right: -28px;
        }

        .old-price {
            color: #9e9e9e;
            font-size: 11px;
            text-decoration: line-through;
        }

        .meta {
            font-size: 11px;
            color: #999999;
            margin-bottom: 10px;
        }

        .stars {
            color: #ffb400;
            letter-spacing: 1px;
            margin-right: 4px;
        }

        .buy-btn {
            width: 100%;
            height: 24px;
            border: none;
            border-radius: 3px;
            background: var(--brand);
            color: #ffffff;
            font-size: 12px;
            cursor: pointer;
        }

        .buy-btn:hover {
            background: var(--brand-deep);
        }

        .footer {
            background: var(--footer);
            color: #d6d6d6;
            padding-top: 28px;
        }

        .footer-top {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 120px;
            padding: 0 180px 32px;
        }

        .footer-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #ffffff;
        }

        .footer a {
            display: block;
            font-size: 12px;
            color: #d0d0d0;
            margin-bottom: 10px;
        }

        .footer a:hover {
            color: #ffffff;
        }

        .copyright {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 12px;
            color: #c7c7c7;
            padding: 14px 0 18px;
        }

        @media (max-width: 1700px) {
            .wrap {
                width: calc(100% - 36px);
            }
        }

        @media (max-width: 1280px) {
            .page {
                min-width: 0;
            }

            .topbar .wrap {
                height: auto;
                padding: 12px 0;
                flex-wrap: wrap;
                gap: 10px;
                justify-content: space-between;
            }

            .search-area {
                order: 3;
                width: 100%;
            }

            .nav .wrap {
                flex-wrap: wrap;
                height: auto;
                padding: 14px 0;
                gap: 18px;
            }

            .category-grid,
            .product-grid,
            .footer-top {
                grid-template-columns: repeat(2, 1fr);
            }

            .footer-top {
                gap: 28px;
                padding: 0 20px 28px;
            }
        }

        @media (max-width: 768px) {
            .wrap {
                width: calc(100% - 24px);
            }

            .category-grid,
            .product-grid,
            .footer-top {
                grid-template-columns: 1fr;
            }

            .user-links {
                gap: 12px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div class="wrap">
                <div class="brand">
                    <span class="brand-badge">🛒</span>
                    <span>优购商城</span>
                </div>

                <div class="search-area">
                    <input class="search-input" type="text" placeholder="搜索商品...">
                    <button class="search-btn">搜索</button>
                </div>

                <nav class="user-links">
                    <a href="#">登录</a>
                    <a href="#">购物车（6）</a>
                    <a href="#">我的订单</a>
                </nav>
            </div>
        </header>

        <nav class="nav">
            <div class="wrap">
                <a href="#">首页</a>
                <a href="#">数码电子</a>
                <a href="#">服装鞋包</a>
                <a href="#">家居生活</a>
                <a href="#">食品饮料</a>
                <a href="#">美妆护肤</a>
                <a href="#">母婴用品</a>
            </div>
        </nav>

        <main class="wrap">
            <section class="hero">
                <h1>新品上市 8折优惠</h1>
                <p>最新数码好品，抢先体验</p>
                <div class="hero-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </section>

            <section>
                <h2 class="section-title">热门分类</h2>
                <div class="category-grid" id="categoryGrid"></div>
            </section>

            <section>
                <h2 class="section-title">热销商品</h2>
                <div class="product-grid" id="productGrid"></div>
            </section>
        </main>

        <footer class="footer">
            <div class="wrap">
                <div class="footer-top">
                    <div>
                        <div class="footer-title">购物指南</div>
                        <a href="#">购物流程</a>
                        <a href="#">会员介绍</a>
                        <a href="#">常见问题</a>
                        <a href="#">联系客服</a>
                    </div>
                    <div>
                        <div class="footer-title">配送方式</div>
                        <a href="#">上门自提</a>
                        <a href="#">快递运输</a>
                        <a href="#">配送范围</a>
                        <a href="#">配送查询</a>
                    </div>
                    <div>
                        <div class="footer-title">支付方式</div>
                        <a href="#">在线支付</a>
                        <a href="#">货到付款</a>
                        <a href="#">分期付款</a>
                    </div>
                    <div>
                        <div class="footer-title">售后服务</div>
                        <a href="#">退换货政策</a>
                        <a href="#">退款说明</a>
                        <a href="#">投诉建议</a>
                    </div>
                </div>
                <div class="copyright">© 2026 优购商城 版权所有</div>
            </div>
        </footer>
    </div>

    <script>
        const categories = [
            { icon: "📱", name: "手机数码" },
            { icon: "👕", name: "服装服饰" },
            { icon: "🏠", name: "家居家装" },
            { icon: "🍎", name: "食品生鲜" },
            { icon: "💄", name: "美妆个护" },
            { icon: "👶", name: "母婴用品" }
        ];

        const products = [
            {
                icon: "📱",
                title: "最新款智能手机 128GB",
                price: 2999,
                oldPrice: 3999,
                sold: 2856,
                bg: "linear-gradient(135deg, #d9e7f8 0%, #f9fcff 58%, #c9d5e4 100%)"
            },
            {
                icon: "🎧",
                title: "真无线蓝牙耳机 降噪版",
                price: 399,
                oldPrice: 599,
                sold: 1523,
                bg: "linear-gradient(135deg, #b4b7c0 0%, #f3f4f7 52%, #82858e 100%)"
            },
            {
                icon: "⌚",
                title: "运动智能手表 心率监测",
                price: 899,
                oldPrice: 1299,
                sold: 986,
                bg: "linear-gradient(135deg, #1d6a7c 0%, #49b3cb 52%, #e9f6f9 100%)"
            },
            {
                icon: "🧥",
                title: "春季休闲夹克 多色可选",
                price: 259,
                oldPrice: 399,
                sold: 734,
                bg: "linear-gradient(135deg, #d4c7a2 0%, #b2a27b 52%, #f1ebe0 100%)"
            },
            {
                icon: "💻",
                title: "轻薄笔记本电脑 14英寸",
                price: 4599,
                oldPrice: 5999,
                sold: 1872,
                bg: "linear-gradient(135deg, #393a40 0%, #6b7486 48%, #eff2f8 100%)"
            },
            {
                icon: "🧴",
                title: "保湿护肤套装 5件套",
                price: 199,
                oldPrice: 299,
                sold: 2145,
                bg: "linear-gradient(135deg, #f8d7de 0%, #f7ecf0 54%, #e0c3c6 100%)"
            }
        ];

        const categoryGrid = document.getElementById("categoryGrid");
        const productGrid = document.getElementById("productGrid");

        categoryGrid.innerHTML = categories.map(item => `
            <div class="category-card">
                <div class="category-icon">${item.icon}</div>
                <div class="category-name">${item.name}</div>
            </div>
        `).join("");

        productGrid.innerHTML = products.map(item => `
            <article class="product-card">
                <div class="product-image" style="background:${item.bg}">
                    <span>${item.icon}</span>
                </div>
                <div class="product-body">
                    <h3 class="product-title">${item.title}</h3>
                    <div class="price-row">
                        <div class="price">¥${item.price}</div>
                        <div class="old-price">¥${item.oldPrice}</div>
                    </div>
                    <div class="meta"><span class="stars">★★★★★</span>(${item.sold})</div>
                    <button class="buy-btn">加入购物车</button>
                </div>
            </article>
        `).join("");
    </script>
</body>
</html>
